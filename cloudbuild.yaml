steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/cortex41-backend:$COMMIT_SHA"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/cortex41-backend:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "cortex41-backend"
      - "--image=gcr.io/$PROJECT_ID/cortex41-backend:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=2Gi"
      - "--cpu=2"
      - "--min-instances=1"
      - "--timeout=3600"
      - "--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID"

images:
  - "gcr.io/$PROJECT_ID/cortex41-backend:$COMMIT_SHA"
